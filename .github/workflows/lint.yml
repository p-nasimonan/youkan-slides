name: Lint

on:
  pull_request:
    paths:
      - 'slides/**/*.md'
      - 'templates/**/*.md'
      - 'components/**/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint Markdown
        run: pnpm run lint || true

      - name: Check formatting
        run: pnpm exec prettier --check 'slides/**/*.md' || true
